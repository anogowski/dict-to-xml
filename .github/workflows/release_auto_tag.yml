# .github/workflows/release.yml  (separate workflow)
on:
  push:
    branches: [main]
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
        with: { fetch-depth: 0 }
      - uses: python-semantic-release/python-semantic-release@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}