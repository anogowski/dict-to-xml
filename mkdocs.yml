site_name: dict-to-xml
site_description: Simple python dict to xml converter
site_author: Adam Nogowski

theme: readthedocs

repo_url: https://github.com/anogowski/dict-to-xml

nav:
  - Home: index.md
  - API Reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: numpy
            show_source: true
            show_signature_annotations: true
            separate_signature: true
